<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bolo Apartment — Calendario</title>

<!-- ============================================================
  BOLO APARTMENT CALENDAR
  Struttura:
  - Legge prenotazioni e pulizie da Google Sheets (opensheet.elk.sh)
  - Scrive su Google Sheets tramite Apps Script Web App
  - Vista mensile su desktop (7 colonne)
  - Vista settimanale su mobile (scorri settimana per settimana)
  - Ogni giorno è diviso in 3 sotto-celle: check-out | pulizie | check-in
============================================================ -->

<style>
/* ============================================================
   VARIABILI GLOBALI E RESET
============================================================ */
:root {
  /* Colori prenotazioni alternati */
  --pren-a-bg: #FFF3CD;
  --pren-a-border: #F0A500;
  --pren-a-text: #7A5200;

  --pren-b-bg: #FFE0B2;
  --pren-b-border: #E07800;
  --pren-b-text: #7A3800;

  /* Colori pulizie per persona */
  --clean-1-bg: #E8F4FD;
  --clean-1-border: #2196F3;
  --clean-1-text: #0D47A1;

  --clean-2-bg: #F3E5F5;
  --clean-2-border: #9C27B0;
  --clean-2-text: #4A148C;

  --clean-3-bg: #E8F5E9;
  --clean-3-border: #4CAF50;
  --clean-3-text: #1B5E20;

  /* Pulizia da fare (rosso) */
  --clean-todo-bg: #FFEBEE;
  --clean-todo-border: #F44336;
  --clean-todo-text: #B71C1C;

  /* Colori UI generali */
  --accent: #C07A3A;
  --accent-dark: #A06030;
  --bg: #F5F3EE;
  --surface: #FFFFFF;
  --border: #E0DDD5;
  --text: #2C2C2A;
  --text-muted: #888880;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Georgia', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ============================================================
   HEADER
============================================================ */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 8px;
}

.logo {
  font-size: 17px;
  font-weight: bold;
  color: var(--text);
  white-space: nowrap;
}
.logo span { color: var(--accent); }

.nav-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 16px;
  cursor: pointer;
  color: var(--text-muted);
  line-height: 1;
}
.nav-btn:hover { background: var(--bg); }

.month-label {
  font-size: 14px;
  font-weight: bold;
  color: var(--text);
  min-width: 140px;
  text-align: center;
}

/* ============================================================
   TOOLBAR (aggiorna + stampa)
============================================================ */
.toolbar {
  background: var(--surface);
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.sync-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
}
.sync-btn:hover { background: var(--accent-dark); }

/* Pulsante stampa: visibile solo su desktop */
.print-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text-muted);
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 5px;
}
.print-btn:hover { background: var(--bg); }

.sync-status { font-size: 12px; color: var(--text-muted); }

/* ============================================================
   GRIGLIA CALENDARIO — DESKTOP (7 colonne)
============================================================ */
.cal-wrap { padding: 12px; }

.day-headers {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 3px;
  margin-bottom: 3px;
}

.day-header {
  text-align: center;
  font-size: 11px;
  font-weight: bold;
  color: var(--text-muted);
  padding: 4px 0;
  letter-spacing: 0.06em;
  font-family: 'Georgia', serif;
}

.weeks { display: flex; flex-direction: column; gap: 3px; }

.week-row {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 3px;
}

/* ============================================================
   SINGOLA CELLA GIORNO
============================================================ */
.day-cell {
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  min-height: 80px;
  background: var(--surface);
}

.day-cell.empty {
  background: var(--bg);
  opacity: 0.4;
}

.day-cell.today-cell { border: 2px solid var(--accent); }

/* Riga numero del giorno */
.day-num-row {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3px 0;
  border-bottom: 1px solid var(--border);
  background: #FAFAF7;
}

.day-num {
  font-size: 11px;
  font-weight: bold;
  color: var(--text-muted);
}

.day-num.today-num {
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
}

/* ============================================================
   3 SOTTO-CELLE: checkout | pulizie | checkin
============================================================ */
.sub-cells {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  height: calc(100% - 22px);
}

.sub {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2px 1px;
  text-align: center;
  min-height: 58px;
  border-right: 1px solid var(--border);
  cursor: pointer;
  overflow: hidden;
}
.sub:last-child { border-right: none; }
.sub:hover { filter: brightness(0.95); }

.sub-name {
  font-size: 8px;
  font-weight: bold;
  display: block;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
  padding: 0 1px;
}

.sub-detail {
  font-size: 7px;
  display: block;
  margin-top: 1px;
  opacity: 0.8;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
}

/* Celle vuote */
.sub-empty { background: #FAFAF7; color: #ccc; }
.sub-empty:hover { background: #F0EDE8; }

/* Checkout (colori prenotazione, vedi JS per alternanza) */
.sub-out-a { background: var(--pren-a-bg); border-top: 2px solid var(--pren-a-border); }
.sub-out-a .sub-name { color: var(--pren-a-text); }
.sub-out-b { background: var(--pren-b-bg); border-top: 2px solid var(--pren-b-border); }
.sub-out-b .sub-name { color: var(--pren-b-text); }

/* Checkin */
.sub-in-a { background: var(--pren-a-bg); border-top: 2px solid var(--pren-a-border); }
.sub-in-a .sub-name { color: var(--pren-a-text); }
.sub-in-b { background: var(--pren-b-bg); border-top: 2px solid var(--pren-b-border); }
.sub-in-b .sub-name { color: var(--pren-b-text); }

/* Soggiorno in corso (cella pulizia durante prenotazione) */
.sub-stay-a { background: var(--pren-a-bg); opacity: 0.7; }
.sub-stay-b { background: var(--pren-b-bg); opacity: 0.7; }

/* Pulizia da fare (rosso, inizio/fine prenotazione senza dati) */
.sub-clean-todo {
  background: var(--clean-todo-bg);
  border-top: 2px solid var(--clean-todo-border);
}
.sub-clean-todo .sub-name { color: var(--clean-todo-text); }

/* Pulizie per persona */
.sub-clean-1 { background: var(--clean-1-bg); border-top: 2px solid var(--clean-1-border); }
.sub-clean-1 .sub-name { color: var(--clean-1-text); }
.sub-clean-2 { background: var(--clean-2-bg); border-top: 2px solid var(--clean-2-border); }
.sub-clean-2 .sub-name { color: var(--clean-2-text); }
.sub-clean-3 { background: var(--clean-3-bg); border-top: 2px solid var(--clean-3-border); }
.sub-clean-3 .sub-name { color: var(--clean-3-text); }

/* ============================================================
   LEGENDA
============================================================ */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-muted);
}

.legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ============================================================
   MODAL (banner inserimento dati)
============================================================ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: 14px;
  padding: 22px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

.modal h3 {
  font-size: 17px;
  font-weight: bold;
  margin-bottom: 3px;
  color: var(--text);
}

.modal-date {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 16px;
  font-family: sans-serif;
}

.modal label {
  font-size: 13px;
  font-weight: bold;
  color: var(--text-muted);
  display: block;
  margin-bottom: 4px;
  font-family: sans-serif;
}

.modal select,
.modal input[type="text"],
.modal input[type="number"] {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 14px;
  margin-bottom: 12px;
  font-family: sans-serif;
  color: var(--text);
  background: var(--surface);
}

.modal-btns {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}

.btn-save {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  font-weight: bold;
}
.btn-save:hover { background: var(--accent-dark); }

.btn-delete {
  background: #FEE;
  color: #C00;
  border: 1px solid #FCC;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}

.btn-cancel {
  background: var(--bg);
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}

.saving-indicator {
  font-size: 12px;
  color: var(--accent);
  text-align: center;
  margin-top: 8px;
  display: none;
  font-family: sans-serif;
}

/* ============================================================
   TOAST NOTIFICHE
============================================================ */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  z-index: 999;
  max-width: 320px;
  text-align: center;
  font-family: sans-serif;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* ============================================================
   RESPONSIVE MOBILE
   Su mobile: mostra una settimana alla volta
   Celle a larghezza fissa, testo troncato
============================================================ */
@media (max-width: 700px) {
  .week-row {
    grid-template-columns: repeat(7, 46px);
    overflow-x: auto;
  }

  .day-headers {
    grid-template-columns: repeat(7, 46px);
    overflow-x: hidden;
  }

  .cal-wrap { padding: 8px; overflow-x: auto; }

  .day-cell { min-height: 70px; }

  .sub { min-height: 48px; }
  .sub-name { font-size: 7px; }
  .sub-detail { font-size: 6px; }

  /* Su mobile nasconde tutte le settimane tranne quella corrente */
  .week-row { display: none; }
  .week-row.visible { display: grid; }

  /* Navigazione settimana su mobile */
  .week-nav { display: flex !important; }

  /* Nascondi navigazione mese su mobile, mostra quella settimana */
  .month-label { font-size: 12px; min-width: 100px; }

  .print-btn { display: none !important; }
}

/* Navigazione settimana (solo mobile) */
.week-nav {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 6px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-muted);
  font-family: sans-serif;
}

/* ============================================================
   STAMPA
============================================================ */
@media print {
  header, .toolbar, .legend, .week-nav { display: none !important; }
  .cal-wrap { padding: 0; }
  .week-row { display: grid !important; page-break-inside: avoid; }
  body { background: #fff; }
  .day-cell { border: 1px solid #ccc; min-height: 60px; }
  .sub { min-height: 40px; }
  .sub-name { font-size: 7px; }
}

.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
  font-size: 14px;
  font-family: sans-serif;
}
</style>
</head>
<body>

<!-- ============================================================
  HEADER: logo + navigazione mese
============================================================ -->
<header>
  <div class="logo">Bolo <span>Apartment</span></div>
  <div class="nav-controls">
    <button class="nav-btn" onclick="changePeriod(-1)">&#8249;</button>

</div>

<!-- ============================================================
  TOOLBAR: aggiorna + stampa
============================================================ -->
<div class="toolbar">
  <button class="sync-btn" onclick="loadData()">&#8635; Aggiorna</button>
  <button class="print-btn" onclick="window.print()">🖨 Stampa</button>
  <span class="sync-status" id="syncStatus">Caricamento...</span>
</div>

<!-- ============================================================

============================================================ -->
<div class="cal-wrap">
  <div class="day-headers" id="dayHeaders">
    <div class="day-header">LUN</div>
    <div class="day-header">MAR</div>

<!-- LEGENDA -->
<div class="legend">

<!-- ============================================================
  MODAL PULIZIE
============================================================ -->
<div class="modal-overlay" id="modalPulizie">

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modalPrenotazione')">Annulla</button>
      <button class="btn-save" onclick="savePrenotazione()">Salva</button>

<script>
// ============================================================
//  CONFIGURAZIONE
//  Modifica SHEET_ID se cambia il Google Sheet
//  Modifica APPS_SCRIPT_URL dopo aver pubblicato lo script
// ============================================================
const SHEET_ID = "1kwUIGJKXYGkLSD97zaL-vnf2cVjjK3Hv7OnUYYCDHzE";
const BASE_URL = `https://opensheet.elk.sh/${SHEET_ID}/`;

// URL dello script Apps Script per la scrittura sul Sheet
// DA COMPILARE dopo aver pubblicato lo script come Web App
const APPS_SCRIPT_URL = "INSERISCI_QUI_URL_APPS_SCRIPT";

// Nomi persone che puliscono → corrispondono ai colori CSS
// clean-1 = Maria, clean-2 = Anna, clean-3 = Marco
const CLEANER_COLORS = { "Maria": "sub-clean-1", "Anna": "sub-clean-2", "Marco": "sub-clean-3" };

const MONTHS = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno",
                "Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

// ============================================================
//  STATO GLOBALE
// ============================================================
let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth();
let curWeek = 0; // indice settimana corrente su mobile
let isMobile = window.innerWidth <= 700;

let prenotazioni = []; // array di oggetti prenotazione
let pulizie = [];      // array di oggetti pulizia

// Per il modal prenotazione
let modalPrenId = null;
// Per il modal pulizia
let modalPulDate = null;
let editingPulIdx = -1;

// ============================================================
//  CARICAMENTO DATI DA GOOGLE SHEETS
// ============================================================
async function loadData() {
  document.getElementById("syncStatus").textContent = "Aggiornamento...";
  try {
    const [rPren, rPul] = await Promise.all([
      fetch(BASE_URL + "Prenotazioni").then(r => r.json()),
      fetch(BASE_URL + "Pulizie").then(r => r.json())
    ]);

    // Mappa le righe del Sheet in oggetti leggibili
    prenotazioni = (rPren || []).map(row => ({
      id:       row["ID"]       || "",
      checkIn:  row["CheckIn"]  || "",
      checkOut: row["CheckOut"] || "",
      ospiti:   row["Ospiti"]   || "",
      note:     row["Note"]     || "",
      nome:     row["Nome"]     || ""
    })).filter(r => r.id);

    pulizie = (rPul || []).map(row => ({
      data:     row["DataPulizia"]    || "",
      tipo:     row["TipoPulizia"]    || "",
      chi:      row["ChiPulisce"]     || "",
      idPren:   row["IDPrenotazione"] || "",
      note:     row["Note"]           || ""
    })).filter(r => r.data);

    // Assegna un indice colore (alternato) a ogni prenotazione
    assignColors();

    renderCalendar();

    const now = new Date();
    document.getElementById("syncStatus").textContent =
      `Aggiornato alle ${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`;
  } catch(e) {
    document.getElementById("syncStatus").textContent = "Errore caricamento";
    console.error(e);
  }
}

// ============================================================
//  ASSEGNA COLORI ALTERNATI ALLE PRENOTAZIONI
//  Ordina per data check-in e alterna A/B
// ============================================================
function assignColors() {
  const sorted = [...prenotazioni].sort((a, b) => {
    return parseDateToObj(a.checkIn) - parseDateToObj(b.checkIn);
  });
  sorted.forEach((p, i) => {
    p.colorClass = i % 2 === 0 ? "a" : "b";
  });
  // Riporta i colori sulle prenotazioni originali per ID
  prenotazioni.forEach(p => {
    const s = sorted.find(x => x.id === p.id);
    if (s) p.colorClass = s.colorClass;
  });
}

// ============================================================
//  UTILITY DATE
//  Tutte le date nel Sheet sono in formato dd/mm/yyyy
// ============================================================
function parseDateToObj(str) {
  if (!str) return null;
  const [d, m, y] = str.split("/");
  return new Date(`${y}-${m}-${d}`);
}

function dateToStr(y, m, d) {
  // Restituisce stringa dd/mm/yyyy
  return `${String(d).padStart(2,"0")}/${String(m+1).padStart(2,"0")}/${y}`;
}

function dateToKey(y, m, d) {
  // Chiave interna yyyy-mm-dd per confronti
  return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function strToKey(ddmmyyyy) {
  if (!ddmmyyyy) return null;
  const [d, m, y] = ddmmyyyy.split("/");
  return `${y}-${m}-${d}`;
}

// ============================================================
//  LOOKUP: trova prenotazione/pulizia per una data specifica
// ============================================================
function getPrenByCheckout(key) {
  return prenotazioni.find(p => strToKey(p.checkOut) === key);
}
function getPrenByCheckin(key) {
  return prenotazioni.find(p => strToKey(p.checkIn) === key);
}
function getPrenDuringStay(key) {
  // Ritorna la prenotazione attiva in quella data (soggiorno in corso)
  return prenotazioni.find(p => {
    const ci = parseDateToObj(p.checkIn);
    const co = parseDateToObj(p.checkOut);
    const d = new Date(key);
    return ci && co && d > ci && d < co;
  });
}
function getPulizia(key) {
  return pulizie.find(p => strToKey(p.data) === key);
}
function getPuliziaIdx(key) {
  return pulizie.findIndex(p => strToKey(p.data) === key);
}

// ============================================================
//  RENDER SOTTO-CELLA SINGOLA
// ============================================================
function renderSubCell(key) {
  const checkout = getPrenByCheckout(key);
  const checkin  = getPrenByCheckin(key);
  const staying  = getPrenDuringStay(key);
  const pulizia  = getPulizia(key);

  // --- CELLA CHECK-OUT ---
  let outHtml = "";
  if (checkout) {
    const c = checkout.colorClass;
    outHtml = `<div class="sub sub-out-${c}" onclick="openModalPren('${checkout.id}')">
      <span class="sub-name">${checkout.nome || "Ospite"}</span>
      ${checkout.ospiti ? `<span class="sub-detail">${checkout.ospiti} osp.</span>` : ""}
    </div>`;
  } else {
    outHtml = `<div class="sub sub-empty"></div>`;
  }

  // --- CELLA PULIZIE ---
  let cleanHtml = "";
  if (pulizia && pulizia.chi) {
    // Pulizia compilata: colore per persona
    const cls = CLEANER_COLORS[pulizia.chi] || "sub-clean-1";
    cleanHtml = `<div class="sub ${cls}" onclick="openModalPulizia('${key}')">
      <span class="sub-name">${pulizia.chi}</span>
      <span class="sub-detail">${pulizia.tipo || ""}</span>
    </div>`;
  } else if (checkout || checkin) {
    // Inizio o fine prenotazione: pulizia da fare (rosso)
    cleanHtml = `<div class="sub sub-clean-todo" onclick="openModalPulizia('${key}')">
      <span class="sub-name">Pulizia</span>
      <span class="sub-detail">da fare</span>
    </div>`;
  } else if (staying) {
    // Soggiorno in corso: stessa tinta della prenotazione
    const c = staying.colorClass;
    cleanHtml = `<div class="sub sub-stay-${c}" onclick="openModalPulizia('${key}')">
      <span class="sub-name" style="opacity:0.4">+</span>
    </div>`;
  } else {
    cleanHtml = `<div class="sub sub-empty" onclick="openModalPulizia('${key}')">
      <span style="font-size:14px;opacity:0.2">+</span>
    </div>`;
  }

  // --- CELLA CHECK-IN ---
  let inHtml = "";
  if (checkin) {
    const c = checkin.colorClass;
    inHtml = `<div class="sub sub-in-${c}" onclick="openModalPren('${checkin.id}')">
      <span class="sub-name">${checkin.nome || "Ospite"}</span>
      ${checkin.ospiti ? `<span class="sub-detail">${checkin.ospiti} osp.</span>` : ""}
    </div>`;
  } else {
    inHtml = `<div class="sub sub-empty"></div>`;
  }

  return outHtml + cleanHtml + inHtml;
}

// ============================================================
//  RENDER CALENDARIO COMPLETO
// ============================================================
function renderCalendar() {
  isMobile = window.innerWidth <= 700;

  document.getElementById("periodLabel").textContent =
    MONTHS[curMonth] + " " + curYear;

  const today    = new Date();
  const firstDay = new Date(curYear, curMonth, 1);
  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();

  // Offset: lunedì = 0
  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6;

  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
  const totalWeeks = totalCells / 7;

  // Su mobile: calcola settimana corrente se non impostata
  if (isMobile && curWeek >= totalWeeks) curWeek = totalWeeks - 1;

  let html = "";

  for (let w = 0; w < totalWeeks; w++) {
    const isVisible = !isMobile || w === curWeek;
    html += `<div class="week-row ${isVisible ? "visible" : ""}">`;

    for (let d = 0; d < 7; d++) {
      const idx = w * 7 + d;
      const dayNum = idx - startOffset + 1;
      const isValid = dayNum >= 1 && dayNum <= daysInMonth;

      if (!isValid) {
        html += `<div class="day-cell empty"></div>`;
        continue;
      }

      const key = dateToKey(curYear, curMonth, dayNum);
      const isToday = today.getDate() === dayNum &&
                      today.getMonth() === curMonth &&
                      today.getFullYear() === curYear;

      const numHtml = isToday
        ? `<span class="day-num today-num">${dayNum}</span>`
        : `<span class="day-num">${dayNum}</span>`;

      html += `<div class="day-cell${isToday ? " today-cell" : ""}">
        <div class="day-num-row">${numHtml}</div>
        <div class="sub-cells">${renderSubCell(key)}</div>
      </div>`;
    }

    html += `</div>`;
  }

  document.getElementById("weeksGrid").innerHTML = html;

  // Aggiorna label settimana su mobile
  updateWeekLabel(startOffset, daysInMonth);
}

// ============================================================
//  NAVIGAZIONE: mese (desktop) o settimana (mobile)
// ============================================================
function changePeriod(dir) {
  if (isMobile) {
    // Naviga settimana per settimana
    const firstDay = new Date(curYear, curMonth, 1);
    let startOffset = firstDay.getDay() - 1;
    if (startOffset < 0) startOffset = 6;
    const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
    const totalWeeks = Math.ceil((startOffset + daysInMonth) / 7);

    curWeek += dir;
    if (curWeek >= totalWeeks) {
      curWeek = 0;
      curMonth++;
      if (curMonth > 11) { curMonth = 0; curYear++; }
    } else if (curWeek < 0) {
      curMonth--;
      if (curMonth < 0) { curMonth = 11; curYear--; }
      const fd2 = new Date(curYear, curMonth, 1);
      let so2 = fd2.getDay() - 1;
      if (so2 < 0) so2 = 6;
      const dim2 = new Date(curYear, curMonth + 1, 0).getDate();
      curWeek = Math.ceil((so2 + dim2) / 7) - 1;
    }
  } else {
    // Naviga mese per mese
    curMonth += dir;
    if (curMonth > 11) { curMonth = 0; curYear++; }
    if (curMonth < 0) { curMonth = 11; curYear--; }
    curWeek = 0;
  }
  renderCalendar();
}

function updateWeekLabel(startOffset, daysInMonth) {
  const label = document.getElementById("weekLabel");
  if (!isMobile) { label.textContent = ""; return; }

  const startIdx = curWeek * 7;
  const endIdx   = startIdx + 6;
  const firstDay = Math.max(1, startIdx - startOffset + 1);
  const lastDay  = Math.min(daysInMonth, endIdx - startOffset + 1);
  label.textContent = `${firstDay} – ${lastDay} ${MONTHS[curMonth]}`;
}

// ============================================================
//  MODAL PULIZIE — apertura, salvataggio, eliminazione
// ============================================================
function openModalPulizia(key) {
  modalPulDate = key;
  const [y, m, d] = key.split("-");
  document.getElementById("pulizieDate").textContent = `${d}/${m}/${y}`;

  const idx = getPuliziaIdx(key);
  editingPulIdx = idx;

  if (idx >= 0) {
    document.getElementById("pulTipo").value = pulizie[idx].tipo || "Finale";
    document.getElementById("pulChi").value  = pulizie[idx].chi  || "";
    document.getElementById("pulNote").value = pulizie[idx].note || "";
    document.getElementById("pulBtnDelete").style.display = "block";
  } else {
    document.getElementById("pulTipo").value = "Finale";
    document.getElementById("pulChi").value  = "";
    document.getElementById("pulNote").value = "";
    document.getElementById("pulBtnDelete").style.display = "none";
  }

  document.getElementById("modalPulizie").classList.add("open");
}

async function savePulizia() {
  const [y, m, d] = modalPulDate.split("-");
  const dataFormatted = `${d}/${m}/${y}`;
  const tipo = document.getElementById("pulTipo").value;
  const chi  = document.getElementById("pulChi").value;
  const note = document.getElementById("pulNote").value;

  // Aggiorna stato locale
  const newRow = { data: dataFormatted, tipo, chi, idPren: "", note };
  if (editingPulIdx >= 0) {
    pulizie[editingPulIdx] = newRow;
  } else {
    pulizie.push(newRow);
  }

  closeModal("modalPulizie");
  renderCalendar();

  // Salva su Google Sheet tramite Apps Script
  await saveToSheet("pulizia", newRow);
}

async function deletePulizia() {
  if (editingPulIdx < 0) return;
  const row = pulizie[editingPulIdx];
  pulizie.splice(editingPulIdx, 1);
  closeModal("modalPulizie");
  renderCalendar();
  await saveToSheet("deletePulizia", { data: row.data });
}

// ============================================================
//  MODAL PRENOTAZIONE — apertura e salvataggio
// ============================================================
function openModalPren(id) {
  modalPrenId = id;
  const p = prenotazioni.find(x => x.id === id);
  if (!p) return;

  document.getElementById("prenDate").textContent =
    `Check-in: ${p.checkIn} → Check-out: ${p.checkOut}`;
  document.getElementById("prenNome").value   = p.nome   || "";
  document.getElementById("prenOspiti").value = p.ospiti || "";
  document.getElementById("prenNote").value   = p.note   || "";

  document.getElementById("modalPrenotazione").classList.add("open");
}

async function savePrenotazione() {
  const p = prenotazioni.find(x => x.id === modalPrenId);
  if (!p) return;

  p.nome   = document.getElementById("prenNome").value;
  p.ospiti = document.getElementById("prenOspiti").value;
  p.note   = document.getElementById("prenNote").value;

  closeModal("modalPrenotazione");
  assignColors();
  renderCalendar();

  // Salva su Google Sheet
  await saveToSheet("prenotazione", { id: p.id, nome: p.nome, ospiti: p.ospiti, note: p.note });
}

// ============================================================
//  SCRITTURA SU GOOGLE SHEET tramite Apps Script Web App
// ============================================================
async function saveToSheet(action, data) {
  if (APPS_SCRIPT_URL === "INSERISCI_QUI_URL_APPS_SCRIPT") {
    showToast("⚠️ Apps Script non configurato — dati salvati solo in memoria");
    return;
  }
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, ...data })
    });
    showToast("✓ Salvato");
  } catch(e) {
    showToast("Errore salvataggio — riprova");
    console.error(e);
  }
}

// ============================================================
//  UTILITY UI
// ============================================================
function closeModal(id) {
  document.getElementById(id).classList.remove("open");
}

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// Chiudi modal cliccando fuori
["modalPulizie", "modalPrenotazione"].forEach(id => {
  document.getElementById(id).addEventListener("click", function(e) {
    if (e.target === this) closeModal(id);
  });
});

// Ricalcola layout al resize
window.addEventListener("resize", () => {
  const wasMobile = isMobile;
  isMobile = window.innerWidth <= 700;
  if (wasMobile !== isMobile) renderCalendar();
});

// ============================================================
//  AVVIO
// ============================================================
loadData();
</script>
